<div class="absolute inset-0 flex min-w-0 flex-col overflow-y-auto" cdkScrollable>

  <!-- Page Header -->
  <app-page-header
    title="Invoice Line Items"
    description="Manage all charges and fees on this invoice"
    icon="receipt_long"
    [breadcrumbs]="breadcrumbs"
    [actionTemplate]="headerActions">
  </app-page-header>

  <!-- Header Action Buttons -->
  <ng-template #headerActions>
    <button mat-stroked-button
            class="!text-white !border-white/40 hover:!bg-white/10"
            (click)="showFilters = !showFilters">
      <mat-icon class="icon-size-5">filter_list</mat-icon>
      <span class="ml-1">{{ showFilters ? 'Hide' : 'Filters' }}</span>
    </button>

    <button mat-flat-button
            class="!bg-white !text-indigo-700 hover:!bg-indigo-50 font-semibold shadow"
            (click)="openCreate()">
      <mat-icon class="icon-size-5">add</mat-icon>
      <span class="ml-1">Add Item</span>
    </button>
  </ng-template>

  <!-- Body -->
  <div class="flex flex-col flex-auto p-4 sm:p-6 gap-4 overflow-y-auto bg-gray-50 dark:bg-gray-900">

    <!-- Stats -->
    <app-stats-cards [cards]="statsCards" [columns]="4"></app-stats-cards>

    <!-- Filter Panel -->
    <app-filter-panel
      [fields]="filterFields"
      [showPanel]="showFilters"
      [columns]="2"
      (filterChange)="onFilterChange($event)"
      (clearAll)="onClearFilters()"
      (togglePanel)="showFilters = !showFilters">
    </app-filter-panel>

    <!-- Data Table -->
    <app-data-table
      [columns]="tableColumns"
      [data]="paginatedData"
      [actions]="tableActions"
      [loading]="isLoading"
      [header]="tableHeader"
      [emptyState]="tableEmptyState"
      [cellTemplates]="cellTemplates">
    </app-data-table>

    <!-- Pagination -->
    <app-pagination
      *ngIf="filteredData.length > itemsPerPage"
      [currentPage]="currentPage"
      [totalItems]="filteredData.length"
      [itemsPerPage]="itemsPerPage"
      [showItemsPerPageSelector]="true"
      [itemsPerPageOptions]="[10, 25, 50]"
      [showPageNumbers]="true"
      itemLabel="items"
      (pageChange)="onPageChange($event)"
      (itemsPerPageChange)="onItemsPerPageChange($event)">
    </app-pagination>

  </div>
</div>

<!-- ═══════════════════════════════════════════════════════════════════════
     Cell Templates
     ═══════════════════════════════════════════════════════════════════════ -->

<!-- Description -->
<ng-template #descriptionCell let-row>
  <div class="flex flex-col">
    <span class="text-sm font-semibold text-gray-900 dark:text-white">{{ row.description }}</span>
    <span *ngIf="row.glCode" class="text-xs text-indigo-500 font-mono">{{ row.glCode }}</span>
  </div>
</ng-template>

<!-- Type -->
<ng-template #typeCell let-row>
  <span *ngIf="row.itemType"
        class="inline-flex items-center px-2 py-0.5 text-xs font-semibold rounded-full
               bg-indigo-50 text-indigo-700 dark:bg-indigo-900/30 dark:text-indigo-300">
    {{ row.itemType }}
  </span>
  <span *ngIf="!row.itemType" class="text-gray-400 text-xs">—</span>
</ng-template>

<!-- Unit Price -->
<ng-template #amountCell let-row>
  <span class="text-sm font-medium text-gray-700 dark:text-gray-300">
    {{ fmt(row.unitPrice) }}
  </span>
</ng-template>

<!-- Discount -->
<ng-template #discountCell let-row>
  <span *ngIf="row.discount > 0" class="text-sm font-medium text-amber-600">
    − {{ fmt(row.discount) }}
  </span>
  <span *ngIf="!row.discount || row.discount === 0" class="text-gray-400 text-xs">—</span>
</ng-template>

<!-- Tax -->
<ng-template #taxCell let-row>
  <div class="flex flex-col items-end">
    <span *ngIf="row.taxAmount > 0" class="text-sm font-medium text-blue-600">
      {{ fmt(row.taxAmount) }}
    </span>
    <span *ngIf="row.taxAmount > 0" class="text-xs text-gray-400">{{ row.taxRate }}%</span>
    <span *ngIf="!row.taxAmount || row.taxAmount === 0" class="text-gray-400 text-xs">—</span>
  </div>
</ng-template>

<!-- Net Amount -->
<ng-template #netCell let-row>
  <span class="text-sm font-bold text-indigo-600 dark:text-indigo-400">
    {{ fmt(row.netAmount) }}
  </span>
</ng-template>
