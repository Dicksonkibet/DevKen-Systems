<!-- ═══════════════════════════════════════════════════════════════════════
     Invoice Items — Parent Orchestrator
     Owns: page header, panel state, split layout
     Delegates: data + filtering to list, form logic to form
     ═══════════════════════════════════════════════════════════════════════ -->

<!-- Page Header -->
<app-page-header
  [title]="invoiceNumber ? 'Invoice ' + invoiceNumber + ' – Line Items' : 'Invoice Line Items'"
  description="Manage all charges and fees on this invoice"
  icon="receipt_long"
  [breadcrumbs]="breadcrumbs"
  [actionTemplate]="headerActions">
</app-page-header>

<!-- Header Action Buttons -->
<ng-template #headerActions>
  <button
    mat-stroked-button
    class="!text-white !border-white/40 hover:!bg-white/10"
    (click)="showFilters = !showFilters">
    <mat-icon class="icon-size-5">filter_list</mat-icon>
    <span class="ml-1">{{ showFilters ? 'Hide' : 'Filters' }}</span>
  </button>

  <button
    mat-flat-button
    class="!bg-white !text-indigo-700 hover:!bg-indigo-50 font-semibold shadow"
    (click)="openCreate()">
    <mat-icon class="icon-size-5">add</mat-icon>
    <span class="ml-1">Add Item</span>
  </button>
</ng-template>

<!-- Page Body -->
<div class="p-4 sm:p-6">

  <!-- Split layout: list left, form panel right -->
  <div class="flex gap-5 items-start">

    <!-- List (fills available width) -->
    <div class="flex-1 min-w-0">
      <app-invoice-items-list
        [invoiceId]="invoiceId"
        [showFilters]="showFilters"
        (addItem)="openCreate()"
        (editItem)="openEdit($event)">
      </app-invoice-items-list>
    </div>

    <!-- Form Panel (fixed width, slides in when open) -->
    <div
      *ngIf="panelMode"
      class="w-full sm:w-[420px] shrink-0 sticky top-6"
      style="max-height: calc(100vh - 120px)">
      <app-invoice-item-form
        [invoiceId]="invoiceId"
        [mode]="panelMode"
        [editItem]="editingItem"
        (saved)="onSaved($event)"
        (cancelled)="closePanel()">
      </app-invoice-item-form>
    </div>

  </div>

</div>
