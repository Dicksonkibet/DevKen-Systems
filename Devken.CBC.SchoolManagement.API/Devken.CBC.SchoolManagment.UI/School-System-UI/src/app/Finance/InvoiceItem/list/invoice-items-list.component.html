<!-- ═══════════════════════════════════════════════════════════════════════
     Invoice Items List
     ═══════════════════════════════════════════════════════════════════════ -->
<div class="flex flex-col gap-5">

  <!-- Stats Cards -->
  <app-stats-cards [cards]="statsCards" [columns]="4"></app-stats-cards>

  <!-- Filter Panel (toggle controlled by parent) -->
  <app-filter-panel
    [fields]="filterFields"
    [showPanel]="showFilters"
    [showToggleButton]="false"
    [columns]="2"
    (filterChange)="onFilterChange($event)"
    (clearAll)="onClearFilters()">
  </app-filter-panel>

  <!-- Data Table -->
  <app-data-table
    [columns]="columns"
    [data]="paginatedItems"
    [actions]="actions"
    [loading]="isLoading"
    [header]="tableHeader"
    [emptyState]="tableEmptyState"
    [cellTemplates]="cellTemplates">
  </app-data-table>

  <!-- Pagination -->
  <app-pagination
    *ngIf="filteredItems.length > itemsPerPage"
    [currentPage]="currentPage"
    [totalItems]="filteredItems.length"
    [itemsPerPage]="itemsPerPage"
    [showPageNumbers]="true"
    itemLabel="items"
    (pageChange)="onPageChange($event)">
  </app-pagination>

</div>

<!-- ═══════════════════════════════════════════════════════════════════════
     Cell Templates
     ═══════════════════════════════════════════════════════════════════════ -->

<!-- Description -->
<ng-template #descriptionCell let-row>
  <div class="flex flex-col">
    <span class="text-sm font-semibold text-gray-900 dark:text-white">{{ row.description }}</span>
    <span *ngIf="row.glCode" class="text-xs text-gray-400 font-mono">{{ row.glCode }}</span>
  </div>
</ng-template>

<!-- Type -->
<ng-template #typeCell let-row>
  <span *ngIf="row.itemType"
        class="inline-flex items-center px-2 py-0.5 text-xs font-semibold rounded-full bg-indigo-50 text-indigo-700 dark:bg-indigo-900/30 dark:text-indigo-300">
    {{ row.itemType }}
  </span>
  <span *ngIf="!row.itemType" class="text-gray-400 text-xs">—</span>
</ng-template>

<!-- Unit Price -->
<ng-template #amountCell let-row>
  <span class="text-sm font-medium text-gray-700 dark:text-gray-300">
    {{ formatCurrency(row.unitPrice) }}
  </span>
</ng-template>

<!-- Discount -->
<ng-template #discountCell let-row>
  <span *ngIf="row.discount > 0" class="text-sm font-medium text-amber-600">
    − {{ formatCurrency(row.discount) }}
  </span>
  <span *ngIf="row.discount === 0" class="text-gray-400 text-xs">—</span>
</ng-template>

<!-- Tax -->
<ng-template #taxCell let-row>
  <div class="flex flex-col items-end">
    <span *ngIf="row.taxAmount > 0" class="text-sm font-medium text-blue-600">
      {{ formatCurrency(row.taxAmount) }}
    </span>
    <span *ngIf="row.taxAmount > 0" class="text-xs text-gray-400">{{ row.taxRate }}%</span>
    <span *ngIf="row.taxAmount === 0" class="text-gray-400 text-xs">—</span>
  </div>
</ng-template>

<!-- Net Amount -->
<ng-template #netCell let-row>
  <span class="text-sm font-bold text-indigo-600 dark:text-indigo-400">
    {{ formatCurrency(row.netAmount) }}
  </span>
</ng-template>
